<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투썸플레이스 이벤트 페이지 모작</title>
    <link rel="stylesheet" href="gift.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <button class="list-btn">▦</button>
        <button class="home-btn">🏠</button>
        <h1>선물하기</h1>
        <button class="find-btn">🔍</button>
        <button class="shopping-btn">🛒</button>
      </header>

      <nav>
        <div class="tab">홈</div>
        <div class="tab">카테고리</div>
        <div class="tab">선물함</div>
      </nav>

      <div>
        <img src="img.PNG" alt="대량구매" />
      </div>

      <section class="category-grid">
        <div class="category-item">
          <div class="icon">🖤</div>
          <span class="label">NEW</span>
        </div>
        <div class="category-item">
          <div class="icon">📢</div>
          <span class="label">생일/축하</span>
        </div>
        <div class="category-item">
          <div class="icon">🎁</div>
          <span class="label">감사/안부</span>
        </div>
        <div class="category-item">
          <div class="icon">🎂</div>
          <span class="label">케이크</span>
        </div>
        <div class="category-item">
          <div class="icon">🎫</div>
          <span class="label">금액권</span>
        </div>
        <div class="category-item">
          <div class="icon">🍰</div>
          <span class="label">디저트세트</span>
        </div>
        <div class="category-item">
          <div class="icon">🧁</div>
          <span class="label">디저트</span>
        </div>
        <div class="category-item">
          <div class="icon">☕</div>
          <span class="label">커피/음료</span>
        </div>
      </section>
      <p>투썸을 선물하세요!</p>
    </div>
  </body>
</html>
