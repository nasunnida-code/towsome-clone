<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투썸플레이스 - 로그인</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>
    <div class="login-container">
        <header class="header">
            <button class="back-btn">← &nbsp; 🏠</button>
            <h1>로그인</h1>
        <button class="home-btn"></button>            
        </header>

        <div class="logo-area">
            <p>A TWOSOME PLACE</P>
        </div>

        <form class="login-form">
            <div class="input-group">
                <input type="text" placeholder="아이디" required><br>
                <input type="password" placeholder="비밀번호" required>
            </div>

            <div class="captcha-info">
                정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를 입력해 주세요.
            </div>
            
            <div class="captcha-box">
                <div class="captcha-image"><img src="2.png"></div>
                <div class="captcha-controls">
                    <button type="button">새로고침</button>
                    <button type="button">음성듣기</button>
                </div>
            </div>
   

            <input type="text" placeholder="자동 입력 방지 문자 입력" class="captcha-input">

            <button type="submit" class="login-btn">로그인</button>
        </form>

        <div class="find-links">
            <a href="#">아이디 찾기</a>
            <span class="divider">|</span>
            <a href="#">비밀번호 찾기</a>
        </div>

        <div class="sns-login">
            <button class="sns-btn kakao">카카오 간편 로그인</button>
            <button class="sns-btn apple">애플 간편 로그인</button>
        </div>

        <div class="signup-prompt">
            <p>투썸하트 앱이 처음이신가요?</p>
            <a href="#" class="signup-link">회원가입하기</a>
        </div>
    </div>
</body>
</html>
