<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투썸플레이스 모바일 클론</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="header">
    <button class="menu-btn">☰</button>
    <h1 class="logo">A TWOSOME PLACE</h1>
    <h1></h1>

    </header>

    <main>
        <section class="main-banner">
            <div class="banner-content">
                <p>우베 제품 출시!</p>
            </div>
        </section>
        <nav class="quick-menu">
            <div class="menu-item"><span>📋</span><p>주문내역</p></div>
            <div class="menu-item"><span>☕</span><p>투썸오더</p></div>
            <div class="menu-item"><span>🎂</span><p>홀케이크예약</p></div>
            <div class="menu-item"><span>🎁</span><p>선물하기</p></div>
            <div class="menu-item"><span>🎉</span><p>이벤트</p></div>
        </nav>
         
        <section class="product-section">
            <h2 class="section-title">가장 많이 주문한 홀케이크</h2>
            <div class="product-grid">
                <div class="product-card">
                    <div class="img-placeholder"></div>
                    <p class="name">스초생®</p>
            </div>
            <div class="product-card">
                <div class="img-placeholder"></div>
                <p class="name">화이트 스초생</p>
            </div>
            <div class="product-card">
                <div class="img-placeholder"></div>
                    <p class="name">망고생</p>
                </div>
                <div class="product-card">
                    <div class="img-placeholder"></div>
                    <p class="name">아박® 홀케이크</p>
                </div>
            </div>
        </section>
    </main>

    
</body>
</html>
