<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투썸플레이스 이벤트 페이지 모작</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <div class="container">
      <header
        class="flex justify-between items-center bg-gray-100 text-4xl px-4 py-3 rounded-lg font-bold text-black"
      >
        <button class="back-btn">←</button>
        <h1>이벤트</h1>
        <button class="home-btn">⌂</button>
      </header>

      <nav
        class="tab-menu flex justify-between items-center bg-white-700 px-4 py-3 rounded-lg font-bold text-black"
      >
        <div class="tab active">진행 중 이벤트</div>
        <div class="tab">종료된 이벤트</div>
      </nav>

      <main>
        <p class="total-count">총 <strong>17</strong>개</p>
        <div class="event-card">
          <span class="status">진행중</span>
          <img src="ja1.PNG" alt="" />
          <h4 class="event-title">26년 가정의 달 케이크 신제품 출시</h4>
          <div class="event-date">2026-04-15 ~ 2026-05-31</div>
        </div>

        <div class="event-card">
          <span class="status">진행중</span>
          <img
            class="image"
            src="https://mcdn.twosome.co.kr/upload/MODS0040/202604/MODS0040_20260409154002_cZGsuuId"
            alt="서울 창업설명회 안내"
          />
          <h4 class="event-title">서울 창업설명회 안내</h4>
          <div class="event-date">2026-04-10 ~ 2026-04-28</div>
        </div>

        <div class="event-card">
          <span class="status">진행중</span>
          <img
            class="image"
            src="https://mcdn.twosome.co.kr/upload/MODS0040/202604/MODS0040_20260407165510_QNAvyhsY"
            alt="샌드위치 신제품 출시"
          />
          <h4 class="event-title">샌드위치 신제품 출시</h4>
          <div class="event-date">2026-04-08 ~ 2026-05-31</div>
        </div>

        <div class="event-card">
          <span class="status">진행중</span>
          <img
            class="image"
            src="https://mcdn.twosome.co.kr/upload/MODS0040/202604/MODS0040_20260406140747_owxxVaGE"
            alt="4월 LG U+ 유플투쁠"
          />
          <h4 class="event-title">4월 LG U+유플투뿔</h4>
          <div class="event-date">2026-04-08 ~ 2026-05-31</div>
        </div>
      </main>
    </div>
  </body>
</html>
